<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>钢翼雷霆</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="shell">
    <div class="hud-top">
      <div class="brand">钢翼雷霆 / CLASSIC RAIDER</div>
      <div class="tip">键盘 WASD / 方向键 + J 或空格射击，K 炸弹；也支持鼠标</div>
    </div>
    <canvas id="game" width="480" height="800"></canvas>
    <div class="hud-bottom">
      <div>移动：WASD / 鼠标</div>
      <div>射击：J / 空格 / 鼠标左键</div>
      <div>炸弹：K / 鼠标右键</div>
    </div>
  </div>
  <script src="./game.js"></script>
</body>
</html>
